<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d0d0d" />
<title>Order Track — Dimitri's Coffee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0d0d; --fg:#fafafa; --card:#121212; --border:#262626; --border2:#1f1f1f;
    --muted:#1f1f1f; --muted-fg:#a6a6a6;
    --primary:#f59e0b; --primary-fg:#2a1d05;
    --accent-bg:#3a2f17; --accent-fg:#f5b942; --accent-border:#4a3c1e;
    --red:#ef4444; --radius:6px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--fg);font-size:14px;overflow:hidden;-webkit-font-smoothing:antialiased}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh}
  svg.ic{width:1em;height:1em;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none;vertical-align:-0.125em}
  button{cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--fg);border-radius:var(--radius);padding:7px 12px;font-weight:500;font-size:13px;transition:.12s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
  button:hover{background:rgba(255,255,255,.05)}
  button:disabled{opacity:.45;cursor:not-allowed}
  .btn-primary{background:var(--primary);color:var(--primary-fg);border-color:var(--primary);font-weight:600}
  .btn-primary:hover{background:#f7ad2e}
  .btn-secondary{background:var(--muted);border-color:var(--border)}
  .btn-ghost{border-color:transparent;background:transparent;color:var(--muted-fg)}
  .btn-ghost:hover{color:var(--fg);background:rgba(255,255,255,.05)}
  .btn-danger{background:var(--red);border-color:var(--red);color:#fff}
  .btn-danger:hover{background:#dc2626}
  .btn-outline-danger{border-color:rgba(239,68,68,.4);color:#f87171;background:transparent}
  .btn-outline-danger:hover{background:rgba(239,68,68,.12)}
  .btn-sm{padding:5px 9px;font-size:12px}
  .btn-icon{padding:6px;width:32px;height:32px;justify-content:center}
  input,select,textarea{background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;outline:none;width:100%;font-family:inherit;font-size:13px}
  input:focus,select:focus,textarea:focus{border-color:var(--primary)}
  input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.9;cursor:pointer;width:18px;height:18px;padding:2px}
  input[type=date],input[type=time]{cursor:pointer;position:relative}
  textarea{resize:vertical;min-height:56px}
  label{font-size:12px;color:var(--fg);display:block;margin-bottom:5px;font-weight:500}
  .field{margin-bottom:14px}
  .muted{color:var(--muted-fg)}
  .row{display:flex;gap:12px;flex-wrap:wrap}.row>*{flex:1;min-width:130px}
  .badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;border:1px solid var(--border);line-height:1.6;white-space:nowrap}
  .badge.accent{background:var(--accent-bg);color:var(--accent-fg);border-color:transparent}
  .badge.accent-outline{border-color:var(--accent-border);color:var(--accent-fg)}
  .badge.outline{color:var(--muted-fg);border-color:rgba(166,166,166,.3)}
  .badge.secondary{background:var(--muted);color:var(--fg);border-color:transparent}
  .badge.destructive{background:rgba(239,68,68,.15);color:#f87171;border-color:rgba(239,68,68,.35);text-transform:uppercase}
  /* Header */
  header{background:rgba(18,18,18,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40;padding-top:env(safe-area-inset-top)}
  .hrow{display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 14px;gap:10px}
  .hleft{display:flex;align-items:center;gap:12px;min-width:0}
  .brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--fg);flex:none}
  .brand .mark{height:30px;width:auto;flex:none;display:block}
  .brand .name{font-size:13px;font-weight:700;line-height:1;letter-spacing:.02em}
  .brand .name b{color:var(--primary);font-weight:800;display:block}
  .divider{width:1px;height:20px;background:var(--border);flex:none}
  nav{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  nav button{font-size:12px;color:var(--muted-fg);border:none;padding:7px 11px;white-space:nowrap;font-weight:500}
  nav button.active{background:var(--muted);color:var(--fg)}
  nav button:hover{color:var(--fg)}
  .hright{display:flex;align-items:center;gap:8px;flex:none}
  .uname{font-size:13px;font-weight:500;color:rgba(250,250,250,.85)}
  .main{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
  /* Summary bar */
  .summary{border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:12px;background:rgba(18,18,18,.5);flex-wrap:wrap}
  .searchbox{position:relative;flex:1;min-width:170px;max-width:300px}
  .searchbox .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted-fg);pointer-events:none;font-size:14px}
  .searchbox input{height:30px;padding-left:30px;padding-right:28px;font-size:12px}
  .searchbox .sx{position:absolute;right:7px;top:50%;transform:translateY(-50%);color:var(--muted-fg);cursor:pointer;background:none;border:none;padding:2px}
  .stat-txt{font-size:13px;color:var(--muted-fg);white-space:nowrap}
  .stat-txt b{color:var(--fg);font-weight:600}
  .live{display:flex;align-items:center;gap:6px;color:rgba(166,166,166,.55);font-size:12px;white-space:nowrap}
  .dot{position:relative;display:inline-flex;width:8px;height:8px}
  .dot .ping{position:absolute;inset:0;border-radius:50%;background:#22c55e;opacity:.6;animation:ping 1.6s cubic-bezier(0,0,.2,1) infinite}
  .dot .core{position:relative;width:8px;height:8px;border-radius:50%;background:#22c55e}
  @keyframes ping{75%,100%{transform:scale(2.2);opacity:0}}
  /* Board */
  .board{flex:1;overflow-x:auto;padding:16px}
  .cols{display:flex;gap:16px;min-width:max-content;height:100%}
  .col{width:288px;flex:none;display:flex;flex-direction:column}
  .col-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 2px}
  .col-head .en{font-size:14px;font-weight:600;line-height:1.1}
  .col-head .ar{font-size:11px;color:var(--muted-fg)}
  .col-body{flex:1;background:rgba(255,255,255,.022);border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:8px;min-height:200px;overflow-y:auto;max-height:calc(100vh - 200px)}
  .col-empty{text-align:center;font-size:12px;color:rgba(166,166,166,.5);padding:30px 0}
  .kcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px;cursor:pointer;transition:.12s;display:flex;flex-direction:column;gap:8px}
  .kcard:hover{border-color:rgba(245,158,11,.4)}
  .kc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .kc-cust{font-weight:600;font-size:13px;line-height:1.25}
  .kc-badges{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .kc-info{font-size:11px;color:var(--muted-fg);display:flex;flex-direction:column;gap:3px}
  .kc-info .li{display:flex;align-items:center;gap:5px}
  .kc-info .li .tx{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .kc-info a{color:var(--muted-fg);text-decoration:none}
  .kc-info a:hover{color:var(--primary)}
  .drvchip{display:inline-flex;align-items:center;gap:4px;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:600;border:1px solid}
  .drvchip .dd{width:6px;height:6px;border-radius:50%;flex:none}
  .ext{color:#fbbf24;font-weight:600}
  .kc-time{font-size:10px;color:rgba(166,166,166,.55)}
  /* Pages */
  .page{padding:20px;max-width:1000px;margin:0 auto;width:100%}
  .page h2{margin:0 0 14px;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
  .box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
  th{color:var(--muted-fg);font-size:11px;font-weight:500}
  tr:last-child td{border-bottom:none}
  .tablewrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;overflow-x:auto}
  .stat-grid{display:flex;gap:12px;flex-wrap:wrap}
  .stat-grid .b{flex:1;min-width:120px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px}
  .stat-grid .n{font-size:28px;font-weight:800;color:var(--primary)}
  .stat-grid .l{font-size:12px;color:var(--muted-fg);margin-top:3px}
  .bar-row{display:flex;align-items:center;gap:12px;margin:9px 0;font-size:13px}
  .bar-row .lbl{width:170px;flex:none}
  .bar-track{flex:1;height:18px;background:var(--muted);border-radius:5px;overflow:hidden}
  .bar-fill{height:100%;background:var(--primary);border-radius:5px}
  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:16px;overflow:auto}
  .modal-bg.open{display:flex}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal.wide{max-width:760px}
  .modal h3{margin:0;padding:18px 20px 0;font-size:18px;font-weight:700}
  .modal .sub{padding:2px 20px 0;font-size:13px;color:var(--muted-fg)}
  .modal .body{padding:16px 20px}
  .modal .foot{padding:14px 20px;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;align-items:center}
  .modal .foot .grow{flex:1}
  .close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted-fg);cursor:pointer;font-size:15px;padding:4px}
  .modal-head{position:relative}
  .kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:6px 0 14px}
  .kv-grid .cspan{grid-column:1/-1}
  .kv-grid .k{font-size:11px;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px;display:flex;align-items:center;gap:5px}
  .kv-grid .v{font-size:13px;display:flex;align-items:center;gap:5px}
  .kv-grid .v a{color:var(--primary);text-decoration:none}
  .notes-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:9px 11px;font-size:13px;color:rgba(250,250,250,.8);white-space:pre-wrap}
  .sect-label{font-size:11px;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.03em;margin:14px 0 8px;display:flex;align-items:center;gap:6px}
  .timeline{position:relative;display:flex;flex-direction:column;gap:14px}
  .tl-item{display:flex;align-items:flex-start;gap:12px}
  .tl-ball{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;flex:none;box-shadow:0 0 0 2px var(--card);font-size:11px;z-index:1}
  .tl-line{position:absolute;left:9px;top:20px;bottom:8px;width:1px;background:var(--border)}
  .tl-c .a{font-size:13px;font-weight:500;line-height:1.3}
  .tl-c .m{font-size:12px;color:var(--muted-fg);margin-top:2px}
  .items-tbl input{font-size:13px}
  .toggle-btns{display:flex;gap:10px}
  .toggle-btns button{flex:1;justify-content:center}
  .toggle-btns button.on{background:var(--primary);color:var(--primary-fg);border-color:var(--primary);font-weight:600}
  .hint{font-size:12px;color:var(--muted-fg);background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:9px 11px;margin-bottom:12px}
  .x{color:var(--muted-fg);cursor:pointer;font-weight:700;padding:0 4px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1c1c1c;border:1px solid var(--primary);color:var(--fg);padding:11px 18px;border-radius:8px;z-index:99;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center;font-size:13px}
  .toast.show{opacity:1}.toast.err{border-color:var(--red)}
  /* Login */
  .login{position:fixed;inset:0;background:var(--bg);z-index:80;display:flex;align-items:center;justify-content:center;padding:18px;overflow:auto}
  .login .box{background:var(--card);border:1px solid var(--border);border-radius:14px;max-width:380px;width:100%;padding:30px 26px;margin:auto}
  .login .lwrap{display:flex;flex-direction:column;align-items:center;margin-bottom:22px}
  .login .mark{height:84px;width:auto}
  .login .tt{margin-top:12px;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted-fg);font-weight:600}
  .login h2{margin:0 0 3px;font-size:20px;font-weight:700}
  .login .err{color:var(--red);font-size:13px;min-height:18px;margin:4px 0}
  .demo{margin-top:16px;font-size:12px;color:var(--muted-fg)}
  .demo summary{cursor:pointer;user-select:none}
  .demo code{color:var(--accent-fg)}
  .demo .drow{margin-top:4px}
  @media(max-width:600px){
    .brand .name{display:none}
    .kv-grid{grid-template-columns:1fr}
    .uname{display:none}
    .hrow{padding:0 10px}
  }
</style>
</head>
<body>
<div id="app" style="display:none">
  <header><div class="hrow">
    <div class="hleft">
      <a class="brand" href="#" id="brandLink"></a>
      <div class="divider"></div>
      <nav id="nav"></nav>
    </div>
    <div class="hright" id="hright"></div>
  </div></header>
  <div class="main" id="main"></div>
</div>

<div class="login" id="login"></div>
<div class="modal-bg" id="modal"><div class="modal modal-head" id="modalInner"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ===== Icons (lucide-style) ===== */
const ICONS={
  dashboard:'<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>',
  archive:'<rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/>',
  chart:'<line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/>',
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  settings:'<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
  logout:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>',

  x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',

  truck:'<path d="M5 18H3c-.6 0-1-.4-1-1V7c0-.6.4-1 1-1h10c.6 0 1 .4 1 1v11"/><path d="M14 9h4l4 4v4c0 .6-.4 1-1 1h-2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/>',
  alert:'<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',

  pkg:'<path d="M16 16h6"/><path d="M19 13v6"/><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>',

  activity:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  key:'<circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/>',

// "full" = edit everything, "items" = edit products only, null = locked
function editScope(o){if(o.isArchived||o.stage==="cancelled"||o.stage==="delivered")return null;if(isAdmin())return "full";if(role()==="sales"&&o.stage==="new"&&o.createdById===me.id)return "full";if(role()==="production"&&o.stage==="packing")return "items";return null;}
function canAdvance(o){
  if(o.stage==="delivered"||o.stage==="cancelled")return false;
  if(isAdmin())return true;
  if(o.stage==="new"&&role()==="production")return true;
  if(o.stage==="packing"&&role()==="fleet")return true;
  if(o.stage==="dispatch"||o.stage==="picked_up"){
    if(o.isOutsourced)return role()==="fleet";
    return role()==="driver"&&o.assignedDriverId===me.id;
  }
  return false;
}
/* ===== Dispatch window / archive ===== */
const minsHHMM=h=>{const[a,b]=h.split(":").map(Number);return a*60+b;};
function windowForNow(){const n=new Date();return (n.getHours()*60+n.getMinutes())>=minsHHMM(state.settings.samedayCutoffTime)?"next_day":"same_day";}
function pastFinal(){const n=new Date();return (n.getHours()*60+n.getMinutes())>minsHHMM(state.settings.finalPickupTime);}
function isLate(o){return o.stage==="dispatch"&&o.dispatchWindow==="same_day"&&pastFinal();}
// Delivered or Cancelled orders auto-archive 3 days after they reached that state
function autoArchive(){const cut=new Date();cut.setDate(cut.getDate()-3);let n=0;state.orders.forEach(o=>{if(!o.isArchived&&(o.stage==="delivered"||o.stage==="cancelled")&&new Date(o.stageUpdatedAt)<=cut){o.isArchived=true;n++;}});if(n)save();}

function classify(a){

  if(a.startsWith("Stage advanced to:"))return{dot:"var(--primary)",icon:ic('arrow','12px'),label:a.replace("Stage advanced to:","→")};
  if(a==="Order details updated")return{dot:"#60a5fa",icon:ic('edit','12px'),label:"Details updated"};
  if(a==="Order archived")return{dot:"#a1a1aa",icon:ic('archive','12px'),label:"Archived"};
  if(/cancel/i.test(a))return{dot:"#ef4444",icon:ic('x','12px'),label:"Order cancelled"};
  if(/^Note/.test(a))return{dot:"#60a5fa",icon:ic('edit','12px'),label:a};
  if(/restored/.test(a))return{dot:"#c084fc",icon:ic('rotate','12px'),label:"Restored from archive"};

}

/* ===== Advance / dispatch ===== */
function advance(id){
  const o=state.orders.find(x=>x.id==id);if(!o)return;
  if(!canAdvance(o))return toast("Not allowed for your role",true);
  const nx=nextStageOf(o);if(!nx)return;
  if(nx.id==="dispatch"){openAssign(o);return;}
  o.stage=nx.id;o.stageUpdatedAt=nowISO();o.isDelayed=false;
  o.activityLog.unshift({id:cryptoId(),action:"Stage advanced to: "+nx.en,note:null,performedByName:me.fullName,createdAt:nowISO()});
  toast("Moved to "+nx.en);render();
}

  openModal(`<h3>Assign Driver — Dispatch</h3><div class="sub">Assign a driver for ${esc(o.customerName)}</div><div class="body">${body}</div><div class="foot"><button class="btn-ghost btn-sm" data-close>Cancel</button><button class="btn-primary btn-sm" id="amGo">Confirm &amp; Dispatch</button></div>`);

/* ===== Reports ===== */
function reportsHTML(){
  const from=window._repFrom||"",to=window._repTo||"";
  const inRange=o=>(!from||o.orderDate>=from)&&(!to||o.orderDate<=to);
  let base=state.orders.filter(inRange);
  if(role()==="driver")base=base.filter(o=>o.assignedDriverId===me.id);
  const active=base.filter(o=>!o.isArchived);
  const archived=base.filter(o=>o.isArchived);
  const delayed=active.filter(isLate).length;
  const rangeLabel=(from||to)?`<span class="badge accent-outline" style="margin-left:6px">${from||'…'} → ${to||'…'}</span>`:'';
  const max=Math.max(1,...STAGES.map(s=>active.filter(o=>o.stage===s.id).length));
  const bars=STAGES.map(s=>{const c=active.filter(o=>o.stage===s.id).length;return `<div class="bar-row"><div class="lbl">${s.en}</div><div class="bar-track"><div class="bar-fill" style="width:${c/max*100}%"></div></div><div style="width:28px;text-align:right;font-weight:600">${c}</div></div>`;}).join("");
  let cost="";
  if(canSeeCost()){const outs=base.filter(o=>o.isOutsourced&&o.outsourceCost);const total=outs.reduce((a,b)=>a+(+b.outsourceCost||0),0);cost=`<div class="box"><h2 style="font-size:15px">Outsourced delivery cost</h2><div class="stat-grid"><div class="b"><div class="n">${total.toFixed(2)}</div><div class="l">Total JOD · ${outs.length} orders</div></div></div></div>`;}
  return `<div class="page"><h2>${ic('chart')} Reports / التقارير ${rangeLabel}</h2>
    <div class="box"><div class="row" style="align-items:flex-end">
      <div class="field" style="margin:0"><label>From date</label><input type="date" id="repFrom" value="${esc(from)}"/></div>
      <div class="field" style="margin:0"><label>To date</label><input type="date" id="repTo" value="${esc(to)}"/></div>
      <div style="flex:0"><button class="btn-secondary btn-sm" id="repClear">Clear</button></div>
    </div></div>
    <div class="box"><div class="stat-grid">
      <div class="b"><div class="n">${active.length}</div><div class="l">Active orders</div></div>
      <div class="b"><div class="n" style="color:${delayed?'#f87171':'var(--primary)'}">${delayed}</div><div class="l">Delayed</div></div>
      <div class="b"><div class="n">${archived.length}</div><div class="l">Archived</div></div>
    </div></div>
    <div class="box"><h2 style="font-size:15px">Orders by stage</h2>${bars}</div>${cost}</div>`;
}

  if(e.target.closest("#addUserBtn")){openUserForm(null);return;}
  const ue=e.target.closest("[data-uedit]");if(ue){openUserForm(userById(ue.dataset.uedit));return;}
  const ur=e.target.closest("[data-ureset]");if(ur){openResetPw(userById(ur.dataset.ureset));return;}
  const ut=e.target.closest("[data-utoggle]");if(ut){const u=userById(ut.dataset.utoggle);u.enabled=!u.enabled;render();return;}
  const ud=e.target.closest("[data-udel]");if(ud){const u=userById(ud.dataset.udel);if(confirm("Delete user "+u.fullName+"?")){state.users=state.users.filter(x=>x.id!==u.id);render();toast("User deleted");}return;}
  if(e.target.closest("#setSave")){state.settings.samedayCutoffTime=$("#setCut").value;state.settings.finalPickupTime=$("#setFin").value;save();render();toast("Settings saved");return;}
  if(e.target.closest("#resetDemo")){if(confirm("Reset demo data on this device?")){state=seed();save();render();toast("Demo reset");}return;}
  if(e.target.closest("#repClear")){window._repFrom="";window._repTo="";$("#main").innerHTML=reportsHTML();return;}
  // Products
  if(e.target.closest("#addProdBtn")){if(!isAdmin())return;openProductForm(null);return;}
  const pe=e.target.closest("[data-pedit]");if(pe){if(!isAdmin())return;openProductForm(state.products.find(p=>p.id===pe.dataset.pedit));return;}
  const pdl=e.target.closest("[data-pdel]");if(pdl){if(!isAdmin())return;const p=state.products.find(x=>x.id===pdl.dataset.pdel);if(confirm("Delete product "+p.name+"?")){state.products=state.products.filter(x=>x.id!==p.id);render();toast("Product deleted");}return;}
  if(e.target.closest("#addFillBtn")){if(!isAdmin())return;const v=($("#fillInput").value||"").trim();if(!v)return;if(state.fillings.some(f=>f.toLowerCase()===v.toLowerCase()))return toast("Already exists",true);state.fillings.push(v);render();toast("Filling added");return;}
  const fd=e.target.closest("[data-fdel]");if(fd){if(!isAdmin())return;state.fillings=state.fillings.filter(f=>f!==fd.dataset.fdel);render();return;}
  if(e.target.closest("#addGrindBtn")){if(!isAdmin())return;const v=($("#grindInput").value||"").trim();if(!v)return;if(state.grinds.some(g=>g.toLowerCase()===v.toLowerCase()))return toast("Already exists",true);state.grinds.push(v);render();toast("Grind option added");return;}
  const gd=e.target.closest("[data-gdel]");if(gd){if(!isAdmin())return;state.grinds=state.grinds.filter(g=>g!==gd.dataset.gdel);render();return;}
  // Customers
  if(e.target.closest("#addCustBtn")){if(!canManageCustomers())return;openCustomerForm(null);return;}
  const ce=e.target.closest("[data-cedit]");if(ce){if(!canManageCustomers())return;openCustomerForm(customerById(ce.dataset.cedit));return;}
  const cdl=e.target.closest("[data-cdel]");if(cdl){if(!canManageCustomers())return;const c=customerById(cdl.dataset.cdel);if(confirm("Delete customer "+c.name+"?")){state.customers=state.customers.filter(x=>x.id!==c.id);render();toast("Customer deleted");}return;}
});
$("#main").addEventListener("input",e=>{
  if(e.target.id==="search"){window._search=e.target.value;
    // update columns + stats without losing focus
    const sel=e.target.selectionStart;
    const board=$(".board"),summary=$(".summary");
    const html=boardHTML();
    $("#main").innerHTML=html;
    const si=$("#search");if(si){si.focus();si.value=window._search;si.setSelectionRange(sel,sel);}
    return;}
  if(["arcCust","arcStatus","arcFrom","arcTo"].includes(e.target.id))renderArc();
  if(e.target.id==="custSearch"){window._custSearch=e.target.value;renderCustList();}
  if(["repFrom","repTo"].includes(e.target.id)){window._repFrom=$("#repFrom").value;window._repTo=$("#repTo").value;$("#main").innerHTML=reportsHTML();}
});
$("#modal").addEventListener("click",e=>{
  if(e.target.closest("[data-close]")||e.target.id==="modal"){closeModal();return;}
  const dt=e.target.closest("[data-detail]");if(dt){const o=state.orders.find(x=>x.id==dt.dataset.detail);if(o)openDetail(o);return;}
  const a=e.target.closest("[data-act]");if(a){const id=a.dataset.id,act=a.dataset.act;
    if(act==="adv"){closeModal();advance(id);}
    else if(act==="note")openNoteForm(id);
    else if(act==="edit"){closeModal();const o=state.orders.find(x=>x.id==id);openOrderForm(o,editScope(o));}
    else if(act==="cancel")cancelOrder(id);
    else if(act==="archive")archiveOrder(id,true);
    else if(act==="restore")archiveOrder(id,false);
  }
});
$("#brandLink").addEventListener("click",e=>{e.preventDefault();view="board";render();});
// click anywhere on a date/time field opens its native picker
document.addEventListener("click",e=>{const el=e.target;if(el&&el.matches&&el.matches("input[type=date],input[type=time]")&&typeof el.showPicker==="function"){try{el.showPicker();}catch(_){}}});

render();
</script>
